name: Shared Obsidian Plugin CI

on:
  workflow_call:
    inputs:
      plugin-id:
        required: true
        type: string
        description: "The unique ID of the plugin (e.g., git-file-sync)"
      node-version:
        required: false
        type: string
        default: "22"
      skip-sonar:
        required: false
        type: boolean
        default: true
    secrets:
      RELEASE_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false

jobs:
  filter:
    name: Check for Code Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'package.json'
              - 'manifest.json'
              - 'tsconfig.json'
              - 'esbuild.config.mjs'
              - 'eslint.config.*'
              - 'vitest.config.ts'
              - 'styles.css'

  lint:
    name: Lint
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Run tests with coverage
        run: npm run test -- --coverage
        
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  sonar:
    name: SonarQube
    needs: [filter, test]
    if: inputs.skip-sonar == false && needs.filter.outputs.code == 'true' && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  artifact:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: [filter, test]
    if: needs.filter.outputs.code == 'true' && needs.test.result == 'success' && (github.event_name == 'pull_request' || (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Create plugin package
        run: |
          VERSION=${{ needs.test.outputs.version }}
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          BRANCH_NAME_SAFE=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
          ZIP_NAME="${{ inputs.plugin-id }}-${VERSION}-${BRANCH_NAME_SAFE}.zip"
          zip -j "$ZIP_NAME" main.js manifest.json styles.css || zip -j "$ZIP_NAME" main.js manifest.json 
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-build-${{ needs.test.outputs.version }}-${{ github.sha }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 7

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: [filter, lint, test]
    if: needs.filter.outputs.code == 'true' && needs.lint.result == 'success' && needs.test.result == 'success' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  status:
    name: CI/CD Status
    runs-on: ubuntu-latest
    if: always()
    needs: [filter, lint, test, sonar, artifact, release]
    steps:
      - name: Check for failures
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || (needs.filter.result == 'skipped')
        run: exit 1
