name: Shared Obsidian Plugin CI

on:
  workflow_call:
    inputs:
      plugin-id:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "22"
      skip-sonar:
        required: false
        type: boolean
        default: true
    secrets:
      RELEASE_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false

jobs:
  filter:
    name: Check for Code Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'package.json'
              - 'manifest.json'
              - 'tsconfig.json'
              - 'esbuild.config.mjs'
              - 'eslint.config.*'
              - 'vitest.config.ts'
              - 'styles.css'

  lint:
    name: Lint
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test -- --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  artifact:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: [filter, test]
    if: needs.filter.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Create plugin package
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          BRANCH_NAME_SAFE=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
          ZIP_NAME="${{ inputs.plugin-id }}-${VERSION}-${BRANCH_NAME_SAFE}.zip"
          zip -j "$ZIP_NAME" main.js manifest.json styles.css || zip -j "$ZIP_NAME" main.js manifest.json 
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-build-artifact-${{ github.sha }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 7

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: [filter, lint, test]
    if: needs.filter.outputs.code == 'true'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx semantic-release
